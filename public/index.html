<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GECO Flipbook Builder</title>
<style>
  :root{
    --navy:#0F2A5C;
    --navy-dark:#0a1d40;
    --accent:#3b6fd6;
    --bg:#f4f6fa;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:#1b2333;
  }
  header{
    background:var(--navy);color:#fff;padding:20px 24px;display:flex;align-items:center;gap:14px;
  }
  header img{height:36px;background:#fff;border-radius:6px;padding:4px;}
  header h1{font-size:18px;margin:0;font-weight:700;letter-spacing:.3px;}
  main{max-width:720px;margin:0 auto;padding:28px 20px 60px;}
  .card{
    background:#fff;border-radius:12px;padding:24px;box-shadow:0 2px 12px rgba(15,42,92,.08);margin-bottom:20px;
  }
  label{display:block;font-size:13px;font-weight:700;color:#41506b;margin-bottom:6px;}
  input[type="password"], input[type="text"]{
    width:100%;padding:10px 12px;border:1px solid #d6dce6;border-radius:8px;font-size:14px;
  }
  button{
    background:var(--navy);color:#fff;border:none;border-radius:8px;padding:10px 18px;
    font-size:14px;font-weight:700;cursor:pointer;transition:background .15s ease;
  }
  button:hover{background:var(--navy-dark);}
  button:disabled{background:#aab3c2;cursor:not-allowed;}
  .hidden{display:none !important;}
  #dropZone{
    border:2px dashed #c3cde0;border-radius:10px;padding:28px;text-align:center;color:#67728a;
    cursor:pointer;font-size:14px;
  }
  #dropZone.drag{border-color:var(--accent);background:#eef3fc;}
  #fileInput{display:none;}
  #thumbs{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px;}
  .thumb{
    width:100px;position:relative;border-radius:8px;overflow:hidden;border:2px solid transparent;
    background:#eee;cursor:grab;
  }
  .thumb img{width:100%;height:70px;object-fit:cover;display:block;}
  .thumb .num{
    position:absolute;top:4px;left:4px;background:rgba(15,42,92,.85);color:#fff;font-size:11px;
    font-weight:700;padding:1px 6px;border-radius:10px;
  }
  .thumb .remove{
    position:absolute;top:4px;right:4px;background:rgba(0,0,0,.55);color:#fff;border:none;
    border-radius:50%;width:18px;height:18px;font-size:12px;line-height:1;cursor:pointer;padding:0;
  }
  .thumb.dragging{opacity:.4;}
  .status{font-size:13px;margin-top:10px;}
  .status.err{color:#c0392b;}
  .status.ok{color:#1a7a4c;}
  #resultBox{
    background:#eef7f0;border:1px solid #b9e0c6;border-radius:8px;padding:16px;margin-top:16px;
  }
  #resultBox a{color:var(--navy);font-weight:700;word-break:break-all;}
  .progress{font-size:13px;color:#67728a;margin-top:8px;}
  .footerlink{display:block;text-align:center;margin-top:24px;font-size:13px;color:#67728a;}
  .footerlink a{color:var(--accent);}
</style>
</head>
<body>

<header>
  <img src="/geco-logo.jpg" alt="GECO logo" onerror="this.style.display='none'">
  <h1>GECO Flipbook Builder</h1>
</header>

<main>

  <div class="card" id="passwordCard">
    <label for="pw">Access password</label>
    <input type="password" id="pw" placeholder="Enter password">
    <div style="margin-top:12px;">
      <button id="unlockBtn">Unlock</button>
    </div>
    <div class="status err hidden" id="pwStatus"></div>
  </div>

  <div class="card hidden" id="buildCard">
    <label for="title">Flipbook title</label>
    <input type="text" id="title" placeholder="e.g. GECO HSE Flipbook — July 2026">

    <div style="height:16px"></div>

    <label>Images (in order — first image is the cover)</label>
    <div id="dropZone">Click or drag images here to add them</div>
    <input type="file" id="fileInput" accept="image/*" multiple>
    <div id="thumbs"></div>

    <div style="margin-top:20px;">
      <button id="buildBtn" disabled>Build Flipbook</button>
    </div>
    <div class="progress hidden" id="progress"></div>
    <div class="status hidden" id="buildStatus"></div>
    <div id="resultBox" class="hidden"></div>
  </div>

  <div class="footerlink"><a href="/admin.html">View all flipbooks →</a></div>

</main>

<script>
let password = null;
let files = []; // { file, dataUrl (thumb preview) }

const pwInput = document.getElementById('pw');
const unlockBtn = document.getElementById('unlockBtn');
const pwStatus = document.getElementById('pwStatus');
const passwordCard = document.getElementById('passwordCard');
const buildCard = document.getElementById('buildCard');
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const thumbsEl = document.getElementById('thumbs');
const buildBtn = document.getElementById('buildBtn');
const progressEl = document.getElementById('progress');
const buildStatus = document.getElementById('buildStatus');
const resultBox = document.getElementById('resultBox');
const titleInput = document.getElementById('title');

async function checkPassword() {
  const val = pwInput.value;
  if (!val) return;
  unlockBtn.disabled = true;
  pwStatus.classList.add('hidden');
  try {
    // Cheap verification: call list-flipbooks, which is password gated.
    const res = await fetch('/api/list-flipbooks', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ password: val })
    });
    if (res.status === 401) {
      pwStatus.textContent = 'Incorrect password.';
      pwStatus.classList.remove('hidden');
      unlockBtn.disabled = false;
      return;
    }
    password = val;
    passwordCard.classList.add('hidden');
    buildCard.classList.remove('hidden');
  } catch (e) {
    pwStatus.textContent = 'Could not reach server. Try again.';
    pwStatus.classList.remove('hidden');
  }
  unlockBtn.disabled = false;
}
unlockBtn.addEventListener('click', checkPassword);
pwInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') checkPassword(); });

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('drag');
  addFiles(Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/')));
});
fileInput.addEventListener('change', () => {
  addFiles(Array.from(fileInput.files));
  fileInput.value = '';
});

function addFiles(newFiles) {
  for (const file of newFiles) {
    const url = URL.createObjectURL(file);
    files.push({ file, previewUrl: url });
  }
  renderThumbs();
}

function renderThumbs() {
  thumbsEl.innerHTML = '';
  files.forEach((entry, i) => {
    const el = document.createElement('div');
    el.className = 'thumb';
    el.draggable = true;
    el.dataset.index = i;
    el.innerHTML = `
      <span class="num">${i + 1}</span>
      <button class="remove" title="Remove">&times;</button>
      <img src="${entry.previewUrl}">
    `;
    el.querySelector('.remove').addEventListener('click', (ev) => {
      ev.stopPropagation();
      files.splice(i, 1);
      renderThumbs();
    });
    el.addEventListener('dragstart', () => el.classList.add('dragging'));
    el.addEventListener('dragend', () => el.classList.remove('dragging'));
    el.addEventListener('dragover', (ev) => ev.preventDefault());
    el.addEventListener('drop', (ev) => {
      ev.preventDefault();
      const fromIdx = Number(document.querySelector('.thumb.dragging')?.dataset.index);
      const toIdx = Number(el.dataset.index);
      if (Number.isNaN(fromIdx) || fromIdx === toIdx) return;
      const [moved] = files.splice(fromIdx, 1);
      files.splice(toIdx, 0, moved);
      renderThumbs();
    });
    thumbsEl.appendChild(el);
  });
  buildBtn.disabled = files.length === 0;
}

// Resize + compress an image file client-side to roughly match the
// GECO flipbook spec (~150-200KB, max width 1400px, JPEG ~70-72 quality).
function compressImage(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const reader = new FileReader();
    reader.onload = () => { img.src = reader.result; };
    reader.onerror = reject;
    img.onload = () => {
      const maxWidth = 1400;
      const scale = Math.min(1, maxWidth / img.width);
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);

      let quality = 0.72;
      const tryEncode = () => {
        const dataUrl = canvas.toDataURL('image/jpeg', quality);
        const approxBytes = Math.ceil((dataUrl.length - 22) * 0.75);
        if (approxBytes > 200 * 1024 && quality > 0.4) {
          quality -= 0.08;
          tryEncode();
        } else {
          resolve(dataUrl);
        }
      };
      tryEncode();
    };
    img.onerror = reject;
    reader.readAsDataURL(file);
  });
}

buildBtn.addEventListener('click', async () => {
  buildBtn.disabled = true;
  buildStatus.classList.add('hidden');
  resultBox.classList.add('hidden');
  progressEl.classList.remove('hidden');

  try {
    const images = [];
    for (let i = 0; i < files.length; i++) {
      progressEl.textContent = `Compressing image ${i + 1} of ${files.length}...`;
      const dataUrl = await compressImage(files[i].file);
      images.push({ filename: files[i].file.name, dataBase64: dataUrl });
    }

    progressEl.textContent = 'Uploading and building flipbook...';
    const res = await fetch('/api/create-flipbook', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ password, title: titleInput.value, images })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed to build flipbook');

    progressEl.classList.add('hidden');
    resultBox.classList.remove('hidden');
    resultBox.innerHTML = `
      <div><strong>${data.title}</strong> is live.</div>
      <div style="margin-top:8px;"><a href="${data.url}" target="_blank">${data.url}</a></div>
    `;
  } catch (e) {
    progressEl.classList.add('hidden');
    buildStatus.textContent = e.message || 'Something went wrong.';
    buildStatus.classList.remove('hidden');
    buildStatus.classList.add('err');
  }
  buildBtn.disabled = false;
});
</script>
</body>
</html>
